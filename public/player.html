<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe id="player" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
  <script>
    // Get video URL from query parameter
    const params = new URLSearchParams(window.location.search);
    const videoUrl = params.get('url');
    
    if (videoUrl) {
      document.getElementById('player').src = videoUrl;
    } else {
      document.body.innerHTML = '<div style="color: white; text-align: center; padding-top: 50px;">No video URL provided</div>';
    }
  </script>
</body>
</html>
